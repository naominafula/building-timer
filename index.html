<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Timers Lab</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>⏱ Timers Lab</h1>


<div class="card">
    <h2>Countdown Timer</h2>
    <input type="number" id="countdownInput" placeholder="Enter seconds">
    <br>
    <button onclick="startCountdown()">Start</button>
    <div class="output" id="countdownOutput"></div>
</div>


<div class="card">
    <h2>Delayed Reminder</h2>
    <input type="text" id="reminderMessage" placeholder="Enter message">
    <input type="number" id="reminderTime" placeholder="Delay (seconds)">
    <br>
    <button onclick="setReminder()">Set Reminder</button>
    <div class="output" id="reminderOutput"></div>
</div>


<div class="card">
    <h2>Recurring Timer</h2>
    <input type="text" id="recurringMessage" placeholder="Enter message">
    <input type="number" id="recurringInterval" placeholder="Interval (seconds)">
    <br>
    <button onclick="startRecurring()">Start</button>
    <button onclick="stopRecurring()">Stop</button>
    <div class="output" id="recurringOutput"></div>
</div>

<script src="script.js"></script>
</body>
</html
